---
# Deployment: Elevation API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elevation-api
  namespace: nekazari
  labels:
    app: elevation-api
    module: eu-elevation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elevation-api
  template:
    metadata:
      labels:
        app: elevation-api
        module: eu-elevation
    spec:
      containers:
        - name: api
          image: ghcr.io/nkz-os/nkz-module-eu-elevation/backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - "app.main:app"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          ports:
            - containerPort: 8000
          env:
            - name: CELERY_BROKER_URL
              value: "redis://redis-service:6379/10"
            - name: CELERY_RESULT_BACKEND
              value: "redis://redis-service:6379/11"
            - name: TERRAIN_WORK_DIR
              value: "/tmp/terrain_work"
            - name: ALLOWED_ORIGINS
              value: "https://nekazari.robotika.cloud"
            - name: JWT_ISSUER
              value: "https://auth.robotika.cloud/auth/realms/nekazari"
            - name: JWKS_URL
              value: "https://auth.robotika.cloud/auth/realms/nekazari/protocol/openid-connect/certs"
            - name: MINIO_ENDPOINT
              value: "minio-service:9000"
            - name: MINIO_BUCKET
              value: "terrain-tilesets"
            - name: DATABASE_URL
              value: "postgresql://nekazari:nekazari@postgresql:5432/nekazari"
          envFrom:
            - secretRef:
                name: minio-secret
                optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
# Deployment: Elevation Worker
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elevation-worker
  namespace: nekazari
  labels:
    app: elevation-worker
    module: eu-elevation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elevation-worker
  template:
    metadata:
      labels:
        app: elevation-worker
        module: eu-elevation
    spec:
      containers:
        - name: worker
          image: ghcr.io/nkz-os/nkz-module-eu-elevation/backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - "-A"
            - "app.worker.celery_app"
            - "worker"
            - "--loglevel=info"
            - "--concurrency=2"
          env:
            - name: CELERY_BROKER_URL
              value: "redis://redis-service:6379/10"
            - name: CELERY_RESULT_BACKEND
              value: "redis://redis-service:6379/11"
            - name: TERRAIN_WORK_DIR
              value: "/tmp/terrain_work"
            - name: GDAL_CACHEMAX
              value: "2048"
            - name: GDAL_NUM_THREADS
              value: "ALL_CPUS"
            - name: MINIO_ENDPOINT
              value: "minio-service:9000"
            - name: MINIO_BUCKET
              value: "terrain-tilesets"
          envFrom:
            - secretRef:
                name: minio-secret
                optional: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
---
# Service: Elevation API
apiVersion: v1
kind: Service
metadata:
  name: elevation-api-service
  namespace: nekazari
  labels:
    app: elevation-api
    module: eu-elevation
spec:
  selector:
    app: elevation-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
