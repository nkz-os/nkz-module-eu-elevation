---
# Secret: Elevation DB credentials
# Apply on server: kubectl apply -f k8s/db-secret.yaml
# Or create manually:
#   kubectl create secret generic elevation-db-secret -n nekazari \
#     --from-literal=DATABASE_URL="postgresql://nekazari:<password>@postgresql:5432/nekazari"
apiVersion: v1
kind: Secret
metadata:
  name: elevation-db-secret
  namespace: nekazari
type: Opaque
stringData:
  # Replace with actual credentials before applying
  DATABASE_URL: "postgresql://nekazari:CHANGE_ME@postgresql:5432/nekazari"
